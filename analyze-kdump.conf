# analyze-kdump 설정 파일
#
# 설치 위치 예:
#   /opt/kdump-tools/analyze-kdump.conf
#
# 스크립트 실행 시 다른 conf 파일을 지정할 수도 있습니다.
#   analyze-kdump -config /path/to/analyze-kdump.conf -report /path/to/vmcore

# 커널 버전별 vmlinux 파일을 보관하는 기준 디렉터리:
#   ${VMLINUX_BASE}/<kernel-version>/vmlinux
VMLINUX_BASE="/opt/kdump-tools/vmlinux"

# -report 결과 파일을 저장할 디렉터리.
REPORT_DIR="/opt/kdump-tools/logs"

# 생성되는 리포트 파일명 접두어.
REPORT_PREFIX="kdump-report"

# 선택 사항: 기본 vmcore 경로. 이 값을 설정하면 명령줄에서
# /path/to/vmcore 인자를 생략할 수 있습니다.
# DEFAULT_VMCORE="/var/crash/127.0.0.1-2026-07-01-10:00:00/vmcore"

# 선택 사항: 리포트에 포함할 crash 명령 목록.
# 설정하지 않으면 스크립트 기본 명령 목록을 사용합니다.
# REPORT_COMMANDS="
# set scroll off
# sys
# bt
# bt -a
# ps
# log
# kmem -i
# mount
# files
# "

# 선택 사항: 별도 파일로 관리하는 crash 명령 목록.
# 설정하면 REPORT_COMMANDS보다 우선합니다.
# REPORT_COMMAND_FILE="/opt/kdump-tools/report-commands.txt"
