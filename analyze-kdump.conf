# analyze-kdump 설정 파일
#
# 설치 위치 예:
#   /opt/kdump-tools/analyze-kdump.conf
#
# 스크립트 실행 시 다른 conf 파일을 지정할 수도 있습니다.
#   analyze-kdump -config /path/to/analyze-kdump.conf -report /path/to/vmcore

# 커널 버전별 vmlinux 파일을 보관하는 기준 디렉터리:
#   ${VMLINUX_BASE}/<kernel-version>/vmlinux
VMLINUX_BASE="/opt/kdump-tools/vmlinux"

# -report 결과 파일을 저장할 디렉터리.
REPORT_DIR="/opt/kdump-tools/logs"

# 생성되는 리포트 파일명 접두어.
REPORT_PREFIX="kdump-report"

# 선택 사항: 기본 vmcore 경로. 이 값을 설정하면 명령줄에서
# /path/to/vmcore 인자를 생략할 수 있습니다.
# DEFAULT_VMCORE="/var/crash/127.0.0.1-2026-07-01-10:00:00/vmcore"

# 선택 사항: 리포트에 포함할 crash 명령 목록.
# 설정하지 않으면 스크립트 기본 명령 목록을 사용합니다.
# REPORT_COMMANDS="
# set scroll off
# sys
# bt
# bt -a
# ps
# log
# kmem -i
# mount
# files
# "

# 선택 사항: 별도 파일로 관리하는 crash 명령 목록.
# 설정하면 REPORT_COMMANDS보다 우선합니다.
# REPORT_COMMAND_FILE="/opt/kdump-tools/report-commands.txt"

# 선택 사항: 리포트 생성 후 LLM으로 원인분석을 추가합니다.
# 1/true/yes/on 중 하나로 설정하면 -report 실행 시 자동으로 동작합니다.
# 명령줄에서 일회성으로 켜려면 analyze-kdump -report -llm /path/to/vmcore 를 사용합니다.
# LLM_ENABLED=0

# OpenAI 호환 Chat Completions API 엔드포인트와 모델명.
# LLM_BASE_URL="https://api.openai.com/v1/chat/completions"
# LLM_MODEL="gpt-4o-mini"

# API 키는 환경변수 LLM_API_KEY로 주입하는 방식을 권장합니다.
# 파일로 관리해야 한다면 권한을 600으로 제한한 뒤 LLM_API_KEY_FILE을 사용합니다.
# LLM_API_KEY_FILE="/opt/kdump-tools/llm-api-key"

# LLM 입력으로 보낼 리포트 최대 문자 수. 초과 시 앞/뒤 일부만 전달합니다.
# LLM_MAX_REPORT_CHARS=60000

# LLM API 호출 제한 시간(초).
# LLM_TIMEOUT=120

# 선택 사항: 기본 분석 프롬프트를 별도 파일로 교체합니다.
# LLM_PROMPT_FILE="/opt/kdump-tools/llm-prompt.txt"
